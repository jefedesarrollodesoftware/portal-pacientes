<form class="auth-form" [formGroup]="form" (ngSubmit)="login()">
  <div class="mb-3">
    <label for="loginDocumentType" class="form-label">Tipo de Documento</label>
    <select
      id="loginDocumentType"
      class="form-select"
      formControlName="tipo_documento"
      [class.is-invalid]="isInvalid('tipo_documento')"
    >
      <option value="" disabled>Seleccione...</option>
      <option *ngFor="let doc of documentTypes" [value]="doc.code">{{ doc.name }}</option>
    </select>
    <div class="invalid-feedback" *ngIf="hasError('tipo_documento', 'required')">
      Selecciona un tipo de documento
    </div>
  </div>

  <div class="mb-3">
    <label for="loginDocumentNumber" class="form-label">N° Documento</label>
    <input
      id="loginDocumentNumber"
      type="text"
      class="form-control"
      formControlName="numero_documento"
      placeholder="1234567890"
      autocomplete="username"
      [class.is-invalid]="isInvalid('numero_documento')"
    />
    <div class="invalid-feedback d-block" *ngIf="hasError('numero_documento', 'required')">
      El número de documento es obligatorio
    </div>
    <div class="invalid-feedback d-block" *ngIf="hasError('numero_documento', 'maxlength')">
      Máx. 45 caracteres
    </div>
  </div>

  <div class="mb-3">
    <label for="loginPassword" class="form-label">Contraseña</label>
    <input
      id="loginPassword"
      class="form-control"
      type="password"
      formControlName="contraseña"
      placeholder="••••••••"
      autocomplete="current-password"
      [class.is-invalid]="isInvalid('contraseña')"
    />
    <div class="invalid-feedback d-block" *ngIf="hasError('contraseña', 'required')">
      La contraseña es obligatoria
    </div>
  </div>

  <div *ngIf="authService.errorMessage" class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 mb-3" role="alert">
    <i class="fas fa-circle-exclamation"></i>
    <span>{{ authService.errorMessage }}</span>
  </div>

  <button class="btn btn-primary w-100" type="submit" [disabled]="form.invalid || authService.isFetching">
    <span *ngIf="authService.isFetching" class="spinner-border spinner-border-sm me-2" role="status"></span>
    {{ authService.isFetching ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
  </button>
</form>
