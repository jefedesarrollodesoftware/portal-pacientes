<div class="dropdown">
  <button class="btn btn-link text-white dropdown-toggle text-decoration-none d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
    <img [src]="avatar()" alt="" class="rounded-circle" width="32" height="32" style="object-fit:cover" />
    <span class="d-none d-sm-inline small">{{ user?.firstName }}</span>
  </button>
  <ul class="dropdown-menu dropdown-menu-end shadow-sm">
    <li><h6 class="dropdown-header">{{ user?.firstName }} {{ user?.lastName }}</h6></li>
    <li><span class="dropdown-item-text small text-muted">{{ user?.email }}</span></li>
    <li><hr class="dropdown-divider" /></li>
    <li><a class="dropdown-item" role="button" (click)="signOutEmit()">Cerrar Sesión</a></li>
  </ul>
</div>
